spring:
  datasource:
    url: "jdbc:mysql://localhost:3311/deliverydb?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true"
    username: myuser
    password: mypassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:19092,localhost:19093,localhost:19094
    consumer:
      group-id: delivery-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        spring.json.trusted.packages: "allmart.deliveryservice.adapter.kafka.dto"
    listener:
      ack-mode: record

logging:
  level:
    allmart: DEBUG
    org.hibernate.SQL: DEBUG
